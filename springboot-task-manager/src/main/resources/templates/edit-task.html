<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Task</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="edit-body">

    <div class="edit-container">

        <h2>Edit Task</h2>

        <form action="/task/save"
              method="post"
              enctype="multipart/form-data">

            <!-- Hidden input for task ID -->
            <input type="hidden"
                   name="id"
                   th:value="${task.id}">

            <label>Task Title:</label><br>

            <input type="text"
                   name="title"
                   th:value="${task.title}"
                   required><br><br>

            <label>Description:</label><br>

            <textarea name="description"
                      rows="4"
                      th:text="${task.description}"></textarea><br><br>

            <label>Change File (Optional):</label><br>

            <p th:if="${task.fileName}"
               class="current-file"
               th:text="'Current file: ' + ${task.fileName}">
            </p>

            <input type="file" name="file"><br><br>

            <div class="edit-actions">

                <button type="submit">
                    Update Task
                </button>

                <a href="/dashboard" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</body>
</html>
